<button
  type="button"
  (click)="onPhotoClicked()"
  class="photo-card-button"
  [aria-label]="'Select photo ' + photo().id"
>
  <mat-card class="photo-card" appearance="filled">
    <img
      class="photo-card__image"
      [src]="photo().thumbnailUrl"
      [alt]="'Photo ' + photo().id"
      loading="lazy"
    />
  </mat-card>
</button>
